{% extends "base.html" %}

{% block title %}Nieuwe Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="display-5 fw-bold">
        <i class="bi bi-person-plus-fill"></i> Nieuwe Sales Manager
    </h1>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-pencil"></i> Manager Gegevens
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Naam</label>
                        <input type="text" class="form-control" id="name" name="name" 
                               required placeholder="bijv. Piet Pietersen">
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" 
                               required placeholder="piet.pietersen@sps.nl">
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Manager Opslaan
                        </button>
                        <a href="{{ url_for('team') }}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Annuleren
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

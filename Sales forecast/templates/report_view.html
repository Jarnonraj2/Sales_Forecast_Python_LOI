{% extends "base.html" %}

{% block title %}Rapport - {{ report.title }}{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h1 class="display-5 fw-bold">
            <i class="bi bi-file-text-fill"></i> {{ report.title }}
        </h1>
        <p class="text-muted">Gegenereerd op {{ report.created_date.strftime('%d-%m-%Y om %H:%M') }}</p>
    </div>
    <div>
        <button onclick="window.print()" class="btn btn-primary">
            <i class="bi bi-printer"></i> Afdrukken
        </button>
        <a href="{{ url_for('reports') }}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Terug
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <pre class="mb-0" style="white-space: pre-wrap; font-family: 'Courier New', monospace;">{{ content }}</pre>
    </div>
</div>
{% endblock %}
